services:
  mongodb:
    image: mongo:7
    container_name: ell-pageant-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ell-pageant

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ell-pageant-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - mongodb
    volumes:
      - ./uploads:/app/uploads

volumes:
  mongo_data:
